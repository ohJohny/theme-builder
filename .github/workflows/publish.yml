name: Publish Packages

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore: release')
    outputs:
      publish: ${{ steps.changes.outputs.publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.9

      - name: Check for releasable changes
        id: changes
        run: echo "publish=$(bun run scripts/has-releasable-changes.ts)" >> "$GITHUB_OUTPUT"

  publish:
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # OH_JOHNY_NPM_TOKEN must include contents: write (push commits + v* tags), not only packages: write
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.OH_JOHNY_NPM_TOKEN }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: https://npm.pkg.github.com
          scope: '@ohJohny'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.9

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Determine version bump
        id: bump
        run: echo "bump=$(bun run scripts/conventional-bump.ts)" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          VERSION=$(bun run scripts/bump-versions.ts ${{ steps.bump.outputs.bump }})
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git add package.json packages/*/package.json
          git commit -m "chore: release v${VERSION} [skip ci]" --no-verify
          git tag "v${VERSION}"

      - name: Push version commit and tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build
        run: bun run build

      - name: Publish packages
        run: bun run scripts/publish-packages.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.OH_JOHNY_NPM_TOKEN }}
